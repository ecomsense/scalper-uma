# Local-only pre-commit (no network needed)
# Install: uv run pre-commit install
default_install_hook_types: [pre-commit]
default_stages: [commit]

repos:
  - repo: local
    hooks:
      - id: syntax-check
        name: Syntax Check
        entry: python -m py_compile
        types: [python]
        pass_filenames: false

      - id: test-check
        name: Run Tests
        entry: pytest
        args: ["tests/", "-v", "--tb=short"]
        pass_filenames: false