<!DOCTYPE html>
<html>
<head>
    <title>Chart Test</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #1a202c; color: #d1d4dc; }
        .chart-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-container { 
            width: 45vw; height: 60vh; background: #262626; border-radius: 8px; padding: 10px; 
        }
        .chart-header { display: flex; justify-content: space-between; padding: 10px; }
        .chart-title { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Chart Test - Drag Price Lines</h2>
    <div class="chart-grid">
        <div class="chart-container" id="ceChartContainer">
            <div class="chart-header">
                <div class="chart-title">Call Option (CE)</div>
            </div>
        </div>
        <div class="chart-container" id="peChartContainer">
            <div class="chart-header">
                <div class="chart-title">Put Option (PE)</div>
            </div>
        </div>
    </div>
    <script>
        const chartOptions = {
            layout: { background: { color: "#1a202c" }, textColor: "#d1d4dc" },
            grid: { vertLines: { color: "#2b2b43" }, horzLines: { color: "#2b2b43" } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { timeVisible: true, secondsVisible: false },
        };

        const candlestickOptions = {
            upColor: "#4CAF50", downColor: "#f44336", borderVisible: false,
            wickUpColor: "#4CAF50", wickDownColor: "#f44336",
        };

        function createTestData(count) {
            let data = [];
            let time = Math.floor(Date.now() / 1000) - count * 60;
            let price = 50;
            for (let i = 0; i < count; i++) {
                let open = price + (Math.random() - 0.5) * 2;
                let close = open + (Math.random() - 0.5) * 3;
                let high = Math.max(open, close) + Math.random();
                let low = Math.min(open, close) - Math.random();
                data.push({ time: time + i * 60, open, high, low, close });
                price = close;
            }
            return data;
        }

        function setupChart(containerId, title) {
            const chartContainer = document.getElementById(containerId);
            const chart = LightweightCharts.createChart(chartContainer, chartOptions);
            const candleSeries = chart.addCandlestickSeries(candlestickOptions);
            
            // OHLC display
            const ohlcDiv = document.createElement('div');
            ohlcDiv.style.cssText = 'position:absolute;top:30px;left:10px;background:#1a202c;color:#d1d4dc;padding:4px 8px;font-size:12px;pointer-events:none;z-index:10;';
            chartContainer.style.position = 'relative';
            chartContainer.appendChild(ohlcDiv);

            chart.subscribeCrosshairMove((param) => {
                if (param.time && param.seriesData.get(candleSeries)) {
                    const data = param.seriesData.get(candleSeries);
                    ohlcDiv.textContent = `O:${data.open.toFixed(2)} H:${data.high.toFixed(2)} L:${data.low.toFixed(2)} C:${data.close.toFixed(2)}`;
                } else {
                    ohlcDiv.textContent = '';
                }
            });

            const data = createTestData(100);
            candleSeries.setData(data);

            // Price lines
            let buyLine = candleSeries.createPriceLine({ price: 50, color: '#4CAF50', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: 'BUY' });
            let stopLine = candleSeries.createPriceLine({ price: 48, color: '#f44336', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: 'STP' });
            let targetLine = candleSeries.createPriceLine({ price: 55, color: '#2196F3', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: 'TGT' });

            // Draggable lines
            let draggingLine = null;
            
            chartContainer.addEventListener('mousedown', (e) => {
                const rect = chartContainer.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const priceScale = candleSeries.priceScale();
                
                const lines = [
                    { line: buyLine, name: 'BUY' },
                    { line: stopLine, name: 'STP' },
                    { line: targetLine, name: 'TGT' }
                ];
                
                for (const { line, name } of lines) {
                    if (!line) continue;
                    const lineY = priceScale.priceToCoordinate(line.options.price);
                    if (lineY && Math.abs(y - lineY) < 10) {
                        draggingLine = { line, name };
                        chartContainer.style.cursor = 'ns-resize';
                        break;
                    }
                }
            });
            
            chartContainer.addEventListener('mousemove', (e) => {
                if (!draggingLine) return;
                const rect = chartContainer.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const priceScale = candleSeries.priceScale();
                const priceRange = priceScale.getVisibleRange();
                const height = rect.height - 60;
                
                if (priceRange) {
                    const range = priceRange.upper - priceRange.lower;
                    let newPrice = priceRange.upper - (y / height) * range;
                    newPrice = Math.round(newPrice * 100) / 100;
                    draggingLine.line.applyOptions({ price: newPrice });
                    ohlcDiv.textContent = `${draggingLine.name}: ${newPrice}`;
                }
            });
            
            chartContainer.addEventListener('mouseup', () => { draggingLine = null; chartContainer.style.cursor = ''; });
            chartContainer.addEventListener('mouseleave', () => { draggingLine = null; chartContainer.style.cursor = ''; });

            return chart;
        }

        setupChart('ceChartContainer', 'CE');
        setupChart('peChartContainer', 'PE');
    </script>
</body>
</html>
