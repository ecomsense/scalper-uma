<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8'>
    <meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate'>
    <meta http-equiv='Pragma' content='no-cache'>
    <meta http-equiv='Expires' content='0'>
    <meta http-equiv='Pragma' content='no-cache'>
    <meta http-equiv='Expires' content='0'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>UMA Scalper</title>
    <script src='https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.development.js'></script>
    <link rel='stylesheet' href='/static/styles.css'>
  </head>
  <body>
    <div class='container'>
      <div class='app-header'>
        <div style='display:flex;align-items:center;gap:8px;'>
          <span style='font-size:1.2rem;'>📈</span>
          <h1 style='margin:0;font-size:1.4em;font-weight:bold;'>UMA Scalper</h1>
        </div>
        <div style='display:flex;gap:10px;padding-right:10px;'>
          <button class='icon-btn' onclick='restartLogic()' title='Restart'>🔄</button>
          <button class='icon-btn' onclick='openLogsModal()' title='Logs'>📋</button>
          <button class='icon-btn' onclick='openSettingsModal()' title='Settings'>⚙️</button>
        </div>
      </div>
      <div class='chart-grid'>
        <div class='chart-container' id='ceChartContainer'>
          <div class='chart-header'>
            <div class='left-buttons'>
              <button class='yellow-btn' id='mkt-btn-CE'>MKT</button>
            </div>
            <div class='chart-title' id='chart-title-CE'>Call Option</div>
            <div class='right-buttons'>
              <button class='blue-btn' id='buy-btn-CE'>High</button>
              <button class='red-btn' id='sell-btn-CE'>CNCL</button>
            </div>
          </div>
          <div id='chart-CE'></div>
        </div>

        <div class='chart-container' id='peChartContainer'>
          <div class='chart-header'>
            <div class='left-buttons'>
              <button class='red-btn' id='sell-btn-PE'>CNCL</button>
              <button class='blue-btn' id='buy-btn-PE'>High</button>
            </div>
            <div class='chart-title' id='chart-title-PE'>Put Option</div>
            <div class='right-buttons'>
              <button class='yellow-btn' id='mkt-btn-PE'>MKT</button>
            </div>
          </div>
          <div id='chart-PE'></div>
        </div>
      </div>

    </div>

    <div class='bottom-panel'>
      <div style='display:flex;justify-content:space-around;align-items:center;font-size:0.85rem;'>
        <span>Positions: <span id='pos-count-footer'>0</span></span>
        <span>Orders: <span id='order-count-footer'>0</span></span>
        <span>M2M: <span id='m2m-footer'>0.00</span></span>
        <span>Realized: <span id='realized-footer'>0.00</span></span>
      </div>
    </div>

    <footer class='app-footer'>Made with <span style='color:red;'>❤</span> by <a href='https://ecomsense.in' target='_blank'>ecomsense.in</a></footer>

    <!-- Settings Modal -->
    <div id='settingsModal' class='modal'>
      <div class='modal-content'>
        <div class='modal-header'>
          <h2>Edit settings.yml</h2>
          <span class='close' onclick='closeSettingsModal()'>&times;</span>
        </div>
        <textarea id='settingsEditor'></textarea>
        <div style='margin-top: 10px;'>
          <button class='green-btn' onclick='saveAndRestart()'>Save & Restart</button>
        </div>
        <div id='settingsMessage' style='margin-top: 10px;'></div>
      </div>
    </div>

    <!-- Logs Modal -->
    <div id='logsModal' class='modal'>
      <div class='modal-content'>
        <div class='modal-header'>
          <h2>Server Logs</h2>
          <span class='close' onclick='closeLogsModal()'>&times;</span>
        </div>
        <textarea id='logsEditor' readonly></textarea>
        <div style='margin-top: 10px;'>
          <button class='blue-btn' onclick='loadLogs()'>Refresh</button>
        </div>
        <div id='logsMessage' style='margin-top: 10px;'></div>
      </div>
    </div>

    <!-- Positions Modal -->
    <div id='positionsModal' class='modal'>
      <div class='modal-content'>
        <div class='modal-header'>
          <h2>Positions</h2>
          <span class='close' onclick='closePositionsModal()'>&times;</span>
        </div>
        <div id='positionsTable'></div>
      </div>
    </div>

    <!-- Orders Modal -->
    <div id='ordersModal' class='modal'>
      <div class='modal-content'>
        <div class='modal-header'>
          <h2>Orders</h2>
          <span class='close' onclick='closeOrdersModal()'>&times;</span>
        </div>
        <div id='ordersTable'></div>
      </div>
    </div>

    <script src='/static/summary.js?v=11'></script>
    <script>
      function closePositionsModal() {
        document.getElementById('positionsModal').style.display = 'none';
      }

      function closeOrdersModal() {
        document.getElementById('ordersModal').style.display = 'none';
      }

      function openLogsModal() {
        document.getElementById('logsModal').style.display = 'block';
        loadLogs();
      }

      function openSettingsModal() {
        document.getElementById('settingsModal').style.display = 'block';
        loadSettings();
      }

      function loadSettings() {
        fetch('/api/admin/settings')
          .then(r => r.json())
          .then(data => {
            if (data.status === 'success') {
              document.getElementById('settingsEditor').value = data.content;
              document.getElementById('settingsMessage').textContent = 'Loaded';
            } else {
              document.getElementById('settingsMessage').textContent = 'Error: ' + data.message;
            }
          })
          .catch(e => {
            document.getElementById('settingsMessage').textContent = 'Error: ' + e;
          });
      }

      async function saveAndRestart() {
        closeSettingsModal();
        const content = document.getElementById('settingsEditor').value;
        await fetch('/api/admin/settings', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({content})
        });
        await new Promise(r => setTimeout(r, 500));
        await fetch('/api/logic/start', { method: 'POST' });
        window.location.reload();
      }

      function closeSettingsModal() {
        document.getElementById('settingsModal').style.display = 'none';
      }

      function loadLogs() {
        fetch('/api/admin/logs')
          .then(r => r.json())
          .then(d => document.getElementById('logsEditor').value = d.content)
          .catch(e => console.error('Logs error:', e));
      }

      function closeLogsModal() {
        document.getElementById('logsModal').style.display = 'none';
      }

      async function restartLogic() {
        await fetch('/api/logic/stop', { method: 'POST' });
        await new Promise(r => setTimeout(r, 500));
        await fetch('/api/logic/start', { method: 'POST' });
        location.reload();
      }
    </script>
    <script src='/static/chart.js?v=59'></script>
  </body>
</html>
