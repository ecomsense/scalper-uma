<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate'>
    <meta http-equiv='Pragma' content='no-cache'>
    <meta http-equiv='Expires' content='0'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>UMA Scalper</title>
    <link rel='stylesheet' href='/static/styles.css'>
    <style>
        .sleep-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; }
        .sleep-emoji { font-size: 4rem; margin-bottom: 1rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .sleep-msg { font-size: 1.8rem; color: #ffd700; margin-bottom: 1.5rem; }
        .clock { font-size: 2.5rem; font-weight: bold; color: #00d9ff; font-family: monospace; }
        .schedule-info { margin-top: 2rem; color: #888; }
        .schedule-badge { display: inline-block; padding: 0.5rem 1rem; margin: 0.25rem; border-radius: 8px; background: rgba(255,255,255,0.1); }
        .schedule-badge.active { background: rgba(0,255,136,0.3); color: #00ff88; }
        .restart-btn { display: none; }
    </style>
</head>
<body>
    <div class='container'>
        <header class='app-header'>
            <div>
                <span style='font-size:1.2rem;'>📈</span>
                <span style='font-size:1.2rem;font-weight:bold;'>UMA Scalper</span>
            </div>
            <div style='display:flex;gap:10px;padding-right:10px;'>
                <button class='icon-btn' onclick='openLogsModal()' title='Logs'>📋</button>
                <button class='icon-btn' onclick='openSettingsModal()' title='Settings'>⚙️</button>
            </div>
        </header>

        <div class='chart-grid'>
            <div class='sleep-container'>
                <div class='sleep-emoji' id='sleepEmoji'>💤</div>
                <div class='sleep-msg' id='sleepMsg'>Zzz... sleeping</div>
                <div class='clock' id='clock'>--:--:--</div>
                <div class='schedule-info' style='margin-top:1.5rem;'>
                    <p style='font-size:1.1em;'>Trading: <strong id='scheduleTime'>loading...</strong> IST</p>
                    <div id='dayBadges' style='margin-top:0.75rem;display:flex;justify-content:center;gap:5px;'></div>
                    <p id='timeStatus' style='margin-top:0.75rem;font-size:1em;'></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id='logsModal' class='modal'>
        <div class='modal-content'>
            <div class='modal-header'>
                <h2>📋 Server Logs</h2>
                <span class='close' onclick='closeLogsModal()'>&times;</span>
            </div>
            <textarea id='logsEditor' readonly></textarea>
            <div style='margin-top:10px;display:flex;gap:10px;'>
                <button class='blue-btn' onclick='loadLogs()'>Refresh</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id='settingsModal' class='modal'>
        <div class='modal-content'>
            <div class='modal-header'>
                <h2>⚙️ Settings</h2>
                <span class='close' onclick='closeSettingsModal()'>&times;</span>
            </div>
            <textarea id='settingsEditor'></textarea>
            <div id='settingsMsg' style='margin-top:10px;color:#888;'>Note: Settings will apply when trading starts</div>
            <div style='margin-top:10px;'>
                <button class='blue-btn' onclick='saveSettings()'>Save Settings</button>
            </div>
        </div>
    </div>

    <footer class='app-footer'>Made with <span style='color:red;'>❤</span> by <a href='https://ecomsense.in' target='_blank'>ecomsense.in</a></footer>

    <script>
        let scheduleData = null;

        function openLogsModal() { document.getElementById('logsModal').style.display='block'; loadLogs(); }
        function closeLogsModal() { document.getElementById('logsModal').style.display='none'; }
        function openSettingsModal() { document.getElementById('settingsModal').style.display='block'; loadSettings(); }
        function closeSettingsModal() { document.getElementById('settingsModal').style.display='none'; }

        function loadLogs() {
            fetch('/api/admin/logs').then(r=>r.json()).then(d=>{
                document.getElementById('logsEditor').value = d.content || '';
            }).catch(e=>{});
        }

        function loadSettings() {
            fetch('/api/admin/settings').then(r=>r.json()).then(d=>{
                if(d.status==='success') document.getElementById('settingsEditor').value = d.content || '';
            }).catch(e=>{});
        }

        async function saveSettings() {
            const content = document.getElementById('settingsEditor').value;
            closeSettingsModal();
            await fetch('/api/admin/settings', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({content})
            });
            showToast('Settings saved', 'green');
        }

        function showToast(msg, color) {
            const t = document.createElement('div');
            t.className = `toast ${color}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(()=>t.remove(), 4000);
        }

        // Fetch schedule from API and update UI
        async function loadScheduleInfo() {
            try {
                // Check both schedule AND trading status
                const [logicResp, schedResp] = await Promise.all([
                    fetch('/api/logic/status'),
                    fetch('/api/schedule')
                ]);
                const logicData = await logicResp.json();
                scheduleData = await schedResp.json();
                
                // Transition to logic page if trading is running and within schedule
                if (logicData.running && scheduleData.within_schedule) {
                    window.location.href = '/logic';
                    return;
                }
                
                // Update schedule time display
                document.getElementById('scheduleTime').textContent = scheduleData.schedule_times;
                
                // Update day badges from API
                const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                const today = new Date().getDay();
                let badges = '';
                for (const dayName of scheduleData.trading_days) {
                    const dayIndex = days.indexOf(dayName);
                    const isToday = dayIndex === today;
                    badges += `<span class='schedule-badge ${isToday?'active':''}'>${dayName}</span>`;
                }
                document.getElementById('dayBadges').innerHTML = badges;
                
                // Update time status
                updateTimeStatus();
            } catch (e) {
                console.error('Failed to load schedule:', e);
            }
        }

        function updateTimeStatus() {
            if (!scheduleData) return;
            
            const statusEl = document.getElementById('timeStatus');
            if (scheduleData.within_schedule) {
                statusEl.textContent = `Market is OPEN - closes in ${scheduleData.time_until_end}`;
                statusEl.style.color = '#00ff88';
            } else {
                statusEl.textContent = `Market is CLOSED - opens in ${scheduleData.time_until_start}`;
                statusEl.style.color = '#ff4757';
            }
        }

        // Random emojis and messages
        const emojis = ['💤', '☕', '😴', '🌙', '🥱', '😎'];
        const msgs = ['Zzz... sleeping', 'Coffee break!', 'Market siesta', 'Hold your horses!', 'Waiting for green candles...'];
        document.getElementById('sleepEmoji').textContent = emojis[Math.floor(Math.random()*emojis.length)];
        const sleepMsg = document.getElementById('sleepMsg');
        sleepMsg.textContent = msgs[Math.floor(Math.random()*msgs.length)];

        // Clock + schedule update
        function updateClock() {
            const now = new Date();
            const ist = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Kolkata'}));
            document.getElementById('clock').textContent = ist.toLocaleTimeString('en-US', {timeZone:'Asia/Kolkata', hour12:false});
            
            // Update time status periodically
            updateTimeStatus();
        }
        
        // Initial load
        loadScheduleInfo();
        updateClock();
        
        // Refresh schedule every 3 seconds (includes auto-transition to logic page)
        setInterval(loadScheduleInfo, 3000);
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
