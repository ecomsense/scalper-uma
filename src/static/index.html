<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UMA Scalper</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.development.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="container">
      <div class="app-header">
        <h1>UMA Scalper</h1>
        <button class="blue-btn" onclick="openSettingsModal()">Settings</button>
      </div>
      <div class="chart-grid">
        <div class="chart-container" id="ceChartContainer">
          <div class="chart-header">
            <div class="left-buttons">
              <button class="yellow-btn" id="mkt-btn-CE">MKT</button>
            </div>
            <div class="chart-title" id="chart-title-CE">Call Option</div>
            <div class="right-buttons">
              <button class="blue-btn" id="buy-btn-CE">High</button>
              <button class="red-btn" id="sell-btn-CE">CNCL</button>
            </div>
          </div>
          <div id="chart-CE"></div>
        </div>

        <div class="chart-container" id="peChartContainer">
          <div class="chart-header">
            <div class="left-buttons">
              <button class="red-btn" id="sell-btn-PE">CNCL</button>
              <button class="blue-btn" id="buy-btn-PE">High</button>
            </div>
            <div class="chart-title" id="chart-title-PE">Put Option</div>
            <div class="right-buttons">
              <button class="yellow-btn" id="mkt-btn-PE">MKT</button>
            </div>
          </div>
          <div id="chart-PE"></div>
        </div>
      </div>

      <div class="footer"></div>
    </div>

    <div class="bottom-panel">
      <div class="panel-item"><span class="label">Positions:</span> <span id="pos-count">0</span></div>
      <div class="panel-item"><span class="label">Orders:</span> <span id="order-count">0</span></div>
      <div class="panel-item"><span class="label">M2M:</span> <span id="m2m">0.00</span></div>
      <div class="panel-item"><span class="label">Realized:</span> <span id="realized">0.00</span></div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Edit settings.yml</h2>
          <span class="close" onclick="closeSettingsModal()">&times;</span>
        </div>
        <textarea id="settingsEditor"></textarea>
        <div style="margin-top: 10px; display: flex; gap: 10px;">
          <button class="green-btn" onclick="saveSettings()">Save</button>
          <button class="blue-btn" onclick="loadSettings()">Load Current</button>
        </div>
        <div id="settingsMessage" style="margin-top: 10px;"></div>
      </div>
    </div>

    <script>
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function playBeep(freq = 800, duration = 150) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);
        osc.start();
        osc.stop(audioCtx.currentTime + duration / 1000);
      }

      function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast ' + (isError ? 'red' : 'green');
        toast.textContent = message;
        document.body.appendChild(toast);
        playBeep(isError ? 600 : 900, isError ? 300 : 150);
        setTimeout(() => toast.remove(), 5000);
      }

      async function loadSettings() {
        try {
          const response = await fetch('/api/admin/settings');
          const data = await response.json();
          if (data.status === 'success') {
            document.getElementById('settingsEditor').value = data.content;
          } else {
            document.getElementById('settingsMessage').innerHTML = 
              '<span style="color: red;">Error: ' + data.message + '</span>';
          }
        } catch (error) {
          document.getElementById('settingsMessage').innerHTML = 
            '<span style="color: red;">Error: ' + error + '</span>';
        }
      }

      async function saveSettings() {
        const content = document.getElementById('settingsEditor').value;
        try {
          const response = await fetch('/api/admin/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content })
          });
          const data = await response.json();
          if (data.status === 'success') {
            document.getElementById('settingsMessage').innerHTML = 
              '<span style="color: green;">' + data.message + '</span>';
          } else {
            document.getElementById('settingsMessage').innerHTML = 
              '<span style="color: red;">Error: ' + data.message + '</span>';
          }
        } catch (error) {
          document.getElementById('settingsMessage').innerHTML = 
            '<span style="color: red;">Error: ' + error + '</span>';
        }
      }

      function openSettingsModal() {
        document.getElementById('settingsModal').style.display = 'block';
        loadSettings();
      }

      function closeSettingsModal() {
        document.getElementById('settingsModal').style.display = 'none';
        document.getElementById('settingsMessage').innerHTML = '';
      }
    </script>
    <script src="/static/chart.js?v=55"></script>
  </body>
</html>
