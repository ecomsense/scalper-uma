<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UMA Scalper</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.development.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="container">
      <div class="app-header">
        <h1>UMA Scalper</h1>
        <div class="header-buttons">
          <button class="blue-btn" onclick="openLogsModal()">Logs</button>
          <button class="blue-btn" onclick="openSettingsModal()">Settings</button>
        </div>
      </div>
      <div class="chart-grid">
        <div class="chart-container" id="ceChartContainer">
          <div class="chart-header">
            <div class="left-buttons">
              <button class="yellow-btn" id="mkt-btn-CE">MKT</button>
            </div>
            <div class="chart-title" id="chart-title-CE">Call Option</div>
            <div class="right-buttons">
              <button class="blue-btn" id="buy-btn-CE">High</button>
              <button class="red-btn" id="sell-btn-CE">CNCL</button>
            </div>
          </div>
          <div id="chart-CE"></div>
        </div>

        <div class="chart-container" id="peChartContainer">
          <div class="chart-header">
            <div class="left-buttons">
              <button class="red-btn" id="sell-btn-PE">CNCL</button>
              <button class="blue-btn" id="buy-btn-PE">High</button>
            </div>
            <div class="chart-title" id="chart-title-PE">Put Option</div>
            <div class="right-buttons">
              <button class="yellow-btn" id="mkt-btn-PE">MKT</button>
            </div>
          </div>
          <div id="chart-PE"></div>
        </div>
      </div>

      <div class="footer"></div>
    </div>

    <div class="bottom-panel">
      <div class="panel-item"><span class="label">Positions:</span> <span id="pos-count">0</span> <button class="small-btn" onclick="showPositionsModal()">Details</button></div>
      <div class="panel-item"><span class="label">Orders:</span> <span id="order-count">0</span> <button class="small-btn" onclick="showOrdersModal()">Details</button></div>
      <div class="panel-item"><span class="label">M2M:</span> <span id="m2m">0.00</span></div>
      <div class="panel-item"><span class="label">Realized:</span> <span id="realized">0.00</span></div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Edit settings.yml</h2>
          <span class="close" onclick="closeSettingsModal()">&times;</span>
        </div>
        <textarea id="settingsEditor"></textarea>
        <div style="margin-top: 10px; display: flex; gap: 10px;">
          <button class="green-btn" onclick="saveSettings()">Save</button>
          <button class="blue-btn" onclick="loadSettings()">Load Current</button>
        </div>
        <div id="settingsMessage" style="margin-top: 10px;"></div>
      </div>
    </div>

    <!-- Logs Modal -->
    <div id="logsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Server Logs</h2>
          <span class="close" onclick="closeLogsModal()">&times;</span>
        </div>
        <textarea id="logsEditor" readonly></textarea>
        <div style="margin-top: 10px;">
          <button class="blue-btn" onclick="loadLogs()">Refresh</button>
        </div>
        <div id="logsMessage" style="margin-top: 10px;"></div>
      </div>
    </div>

    <!-- Positions Modal -->
    <div id="positionsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Positions</h2>
          <span class="close" onclick="closePositionsModal()">&times;</span>
        </div>
        <div id="positionsTable"></div>
      </div>
    </div>

    <!-- Orders Modal -->
    <div id="ordersModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Orders</h2>
          <span class="close" onclick="closeOrdersModal()">&times;</span>
        </div>
        <div id="ordersTable"></div>
      </div>
    </div>

<script src="/static/summary.js?v=1"></script>
    <script>
      function closePositionsModal() {
        document.getElementById('positionsModal').style.display = 'none';
      }

      function closeOrdersModal() {
        document.getElementById('ordersModal').style.display = 'none';
      }
    </script>
    <script src="/static/chart.js?v=57"></script>
  </body>
</html>
